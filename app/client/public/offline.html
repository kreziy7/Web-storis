<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Reminder — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: #181c1a;
      color: #c8ccc9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 24px;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #252b27;
      border: 1px solid #2e3631;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e8e4de;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.875rem;
      color: #7a8a80;
      max-width: 280px;
      line-height: 1.6;
    }

    button {
      margin-top: 8px;
      padding: 10px 24px;
      background: #2e4a3a;
      border: 1px solid #408a71;
      border-radius: 8px;
      color: #b6d4c5;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: #3a5c49;
    }

    .status {
      font-size: 0.75rem;
      color: #4a5a50;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="icon">📵</div>
  <h1>You're offline</h1>
  <p>No internet connection. Your data is saved locally and will sync when you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
  <p class="status">~ smart-reminder-pwa · offline-first</p>

  <script>
    // Auto-reload when connection restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
